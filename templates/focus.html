<!DOCTYPE html>
<html>
<head>
    <title>MindMate – Focus Reset</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
    <h2>Let’s reset your focus</h2>

   <div class="steps">
    <div>Sit comfortably.</div>
    <div>Breathe in for 4 seconds.</div>
    <div>Hold for 4 seconds.</div>
    <div>Breathe out for 6 seconds.</div>
</div>


    <p style="margin-top:15px;">
        Repeat this 3 times.
    </p>

    <button onclick="window.location.href='/checkin'">
        I feel more focused
    </button>
</div>

</body>
</html>
